
name: transparencia-wrapper
services:
  migrate:
    image: migrate/migrate
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.production
    volumes:
      - ./cmd/migrate/migrations:/migrations
    entrypoint: ["/bin/sh", "-c"]
    command: ["migrate -path /migrations -database $DB_ADDR up"]
    restart: on-failure

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: transparencia-api
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env.production
    environment:
      ADDR: ":8080"
      API_URL: "localhost:8080"
    ports:
      - "8080:8080"
    networks:
      - default
      - saga-shared
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  db:
    image: postgres:18-alpine
    env_file:
      - .env.production
    ports:
      - "5454:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d transparency_wrapper_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

networks:
  default:
    driver: bridge
  saga-shared:
    external: true